version: '3.8'

services:
  saturivia-nestjs:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: saturivia-nestjs
    restart: always
    environment:
      MONGO_USERNAME: ${MONGO_USERNAME:-mongouser}
      MONGO_PASSWORD: ${MONGO_PASSWORD:-password}
      MONGO_HOST: saturivia-mongo
      MONGO_PORT: ${MONGO_PORT:-27017}
      MONGO_DATABASE: ${MONGO_DATABASE:-saturivia-db}
    ports:
      - "4000:4000"
    volumes:
      - .:/usr/src/app
      - /usr/src/app/node_modules
    depends_on:
      - saturivia-mongo
    networks:
      - saturivia-network

  saturivia-mongo:
    image: mongo:latest
    container_name: saturivia-mongo
    restart: always
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USERNAME:-mongouser}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-password}
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    networks:
      - saturivia-network

volumes:
  mongo-data:
    driver: local

networks:
  saturivia-network:
    driver: bridge